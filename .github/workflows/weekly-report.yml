name: Generate Weekly Report

on:
  schedule:
    - cron: '0 0 * * 6'  # 매주 토요일 KST 09:00 (UTC 00:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate Weekly Report
        run: python3 scripts/weekly_main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # push → 기존 deploy.yml의 push 트리거가 빌드+배포를 담당
      - name: Commit and Push weekly report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate weekly AI curation report"
          branch: main
          file_pattern: "reports/weekly/*.md"
