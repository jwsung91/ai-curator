name: Generate & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * *'   # 매일 KST 10:00 (UTC 01:00)
  workflow_dispatch:

permissions:
  contents: write # 마크다운 파일 커밋/푸시를 위해 write 권한 부여
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          
      - name: Install Node dependencies
        run: npm ci
        
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt
        
      # 스케줄 실행 또는 수동 실행 시에만 파이프라인 작동
      - name: Run Data Pipeline (Generate AI Report)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      # 스케줄 실행 또는 수동 실행 시에만 커밋/푸시 작동
      - name: Commit and Push generated files
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate daily AI curation report"
          branch: main
          file_pattern: "src/content/curation/*.md scripts/seen_links.json"
          
      - name: Build Astro Site
        run: npm run build
        
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
