name: AI Curator Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 21 * * 0-4'  # Daily: Mon-Fri 06:00 KST (Sun-Thu 21:00 UTC)
    - cron: '0 0 * * 6'     # Weekly: Sat 09:00 KST (Sat 00:00 UTC)
  workflow_dispatch:
    inputs:
      run_daily:
        description: 'Run Daily Report'
        type: boolean
        default: true
      run_weekly:
        description: 'Run Weekly Report'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          
      - name: Install Node dependencies
        run: npm ci
        
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt
        
      - name: Run Daily Pipeline
        id: daily
        if: github.event.schedule == '0 21 * * 0-4' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_daily == 'true')
        run: npm run generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Weekly Pipeline
        id: weekly
        if: github.event.schedule == '0 0 * * 6' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_weekly == 'true')
        run: npm run generate:weekly
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Commit and Push generated files
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate reports"
          branch: main
          file_pattern: "reports/daily/*.md reports/daily/*.json reports/weekly/*.md scripts/seen_links.json"

      - name: Notify Issue (Daily)
        if: steps.daily.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_DATE=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          gh issue comment 14 --repo ${{ github.repository }} --body "### 🗞️ 데일리 리포트 — ${REPORT_DATE}

🔗 [리포트 바로가기](https://jwsung91.github.io/ai-curator/curation/${REPORT_DATE}/)"

      - name: Notify Issue (Weekly)
        if: steps.weekly.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK_LABEL=$(TZ='Asia/Seoul' date +'%G-W%V')
          WEEK_ID=$(echo "$WEEK_LABEL" | tr '[:upper:]' '[:lower:]')
          gh issue comment 14 --repo ${{ github.repository }} --body "### 📚 위클리 리포트 — ${WEEK_LABEL}

🔗 [리포트 바로가기](https://jwsung91.github.io/ai-curator/weekly/${WEEK_ID}/)"

      - name: Generate Job Summary (Daily)
        if: always() && steps.daily.outcome == 'success'
        run: |
          REPORT_DATE=$(TZ='Asia/Seoul' date +'%Y-%m-%d')
          PUBLISHED_AT=$(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')
          echo "### 🗞️ AI Curator: Daily Report Ready" >> $GITHUB_STEP_SUMMARY
          echo "로보틱스/AI 기술 소식이 KST 06:00에 발행되었습니다." >> $GITHUB_STEP_SUMMARY
          echo "📅 **날짜**: $REPORT_DATE" >> $GITHUB_STEP_SUMMARY
          echo "🕕 **발행 시각**: $PUBLISHED_AT" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[데일리 리포트 바로가기](https://jwsung91.github.io/ai-curator/curation/$REPORT_DATE/)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Generate Job Summary (Weekly)
        if: always() && steps.weekly.outcome == 'success'
        run: |
          WEEK_LABEL=$(TZ='Asia/Seoul' date +'%G-W%V')
          WEEK_ID=$(echo "$WEEK_LABEL" | tr '[:upper:]' '[:lower:]')
          echo "### 📚 AI Curator: Weekly Report Ready" >> $GITHUB_STEP_SUMMARY
          echo "월~금 리포트를 모은 위클리 리포트가 토요일 KST 09:00에 발행되었습니다." >> $GITHUB_STEP_SUMMARY
          echo "🗓️ **주차**: $WEEK_LABEL" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[위클리 리포트 바로가기](https://jwsung91.github.io/ai-curator/weekly/$WEEK_ID/)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
      - name: Build Astro Site
        run: npm run build
        
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
